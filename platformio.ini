; ============================================================================
; STATUS: PARKED / experimental — this is NOT the build path currently in use.
;
; Background: PlatformIO was installed while bringing up the Antigravity 2.0 AI
; IDE. That IDE proved too complicated for the high-school students using it, and
; it failed to produce a working SD-card test in its ~1 hour attempt (vs the ~4
; hours it took Claude Code to fully solve it — see hardware-tests/HT-HC33_SDTest/).
; Antigravity is abandoned for now, so this PlatformIO config is left parked.
;
; The project is built with the Arduino IDE + Heltec's "ESP32 HaLow" core
; (heltec:esp_halow). See videowithinterfacesketch/ (camera firmware) and
; hardware-tests/HT-HC33_SDTest/ (SD test). PlatformIO was tried and set aside
; because it does NOT fully support the Heltec HT-HC33:
;
;   * No HT-HC33 board definition exists in PlatformIO. 'esp32-s3-devkitc-1'
;     below is only a generic ESP32-S3 stand-in — flash size and PSRAM
;     (the HT-HC33 uses OPI/QSPI) may need board_build overrides or the board
;     won't boot reliably.
;   * PlatformIO's espressif32 platform uses the STANDARD arduino-esp32 core,
;     which does NOT include Heltec's HaLow stack. Consequences:
;       - The Wi-Fi HaLow radio APIs are unavailable — the camera firmware
;         depends on them, so this is the actual blocker.
;       - 'halow_SD.h' does not exist here; use the standard <SD.h> instead.
;         (SD-over-SPI is generic: same pins CLK=15 / MISO=16 / MOSI=11 /
;         CS=10 on HSPI work fine with the stock SD library.)
;   * ARDUINO_USB_CDC_ON_BOOT MUST be 0 on the HT-HC33: its USB-C port is wired
;     to an external CP2102 UART, not the ESP32-S3's native USB. With it set to
;     1, Serial is routed to native USB and the serial monitor stays blank.
;
; Kept for a possible future attempt (e.g. a HaLow-capable PIO platform, or
; non-HaLow SD/sensor experiments). To revive: drop a source file into src/.
; ============================================================================

[platformio]
default_envs = heltec_hc33

[env:heltec_hc33]
platform = espressif32
board = esp32-s3-devkitc-1        ; generic ESP32-S3 stand-in; no real HT-HC33 board def in PIO
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0   ; HT-HC33 serial is via external CP2102 UART, not native USB

[env:lilygo_t_halow_p4]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-p4
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1   ; different board (ESP32-P4); native USB CDC is appropriate here
