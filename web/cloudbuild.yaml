# Auto-deploy the Next.js dashboard to Cloud Run.
#
# Wired to a Cloud Build trigger: on push to `main` (filtered to web/**), this
# builds web/Dockerfile and deploys the `wildlife-dashboard` service. It mirrors
# web/deploy.sh exactly -- same service, region, service account, env vars, and
# the camera-api-key secret -- so manual and automated deploys behave identically.
# deploy.sh stays as a manual fallback. See docs/PLAN-cloud-onboarding.md (Phase 1).

steps:
  # 0) Test gate: install deps, run the fast unit/route suite, then boot the
  #    Firebase emulators and run the rules tests against the committed
  #    firebase-rules.json + firestore.rules. Cloud Build steps run sequentially
  #    and abort on a non-zero exit, so a failing test here prevents the docker
  #    build and deploy. Java is needed for the emulator (the only reason this
  #    step uses a debian image + apt-get instead of plain `node:20`).
  #    firebase-tools dropped JDK <21 support and Debian 12's repos (bookworm
  #    main + backports) don't ship openjdk-21, so we install JDK 21 from the
  #    Eclipse Adoptium apt repo -- the canonical Temurin distribution, which
  #    publishes temurin-21-jre for bookworm/amd64 directly. Pin the base to
  #    -bookworm so a future Docker Hub flip to trixie doesn't silently break
  #    the apt source line.
  #    Local dev: `npm test` for the fast suite, `npm run test:rules` for rules.
  - name: 'node:20-bookworm'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -eu
        apt-get update -qq
        apt-get install -y -qq --no-install-recommends wget gnupg ca-certificates
        mkdir -p /etc/apt/keyrings
        wget -qO /etc/apt/keyrings/adoptium.asc https://packages.adoptium.net/artifactory/api/gpg/key/public
        echo 'deb [signed-by=/etc/apt/keyrings/adoptium.asc] https://packages.adoptium.net/artifactory/deb bookworm main' \
          > /etc/apt/sources.list.d/adoptium.list
        apt-get update -qq
        apt-get install -y -qq --no-install-recommends temurin-21-jre
        cd web
        npm ci
        npm test
        npm run test:rules

  # 1) Build the image from the committed Dockerfile (context = web/).
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/wildlife-dashboard:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/wildlife-dashboard:latest'
      - '-f'
      - 'web/Dockerfile'
      - 'web'

  # 2) Push both tags.
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/wildlife-dashboard']

  # 3) Deploy to Cloud Run as the keyless cloud-backend service account.
  #    Server secrets come from Secret Manager; NEXT_PUBLIC_* are baked in at
  #    build time from web/.env.production (public by design).
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'wildlife-dashboard'
      - '--image=gcr.io/$PROJECT_ID/wildlife-dashboard:$SHORT_SHA'
      - '--region=us-west1'
      - '--service-account=cloud-backend@$PROJECT_ID.iam.gserviceaccount.com'
      - '--allow-unauthenticated'
      - '--quiet'
      - '--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,GCLOUD_STORAGE_BUCKET=wildlife-camera-telemetry,FIREBASE_DATABASE_URL=https://louielabs-animal-cams-default-rtdb.firebaseio.com,FIRESTORE_DATABASE_ID=wildlife-camera-telemetry-db,APP_ENV=prod'
      - '--set-secrets=CAMERA_API_KEY=camera-api-key:latest'

images:
  - 'gcr.io/$PROJECT_ID/wildlife-dashboard:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/wildlife-dashboard:latest'

options:
  logging: CLOUD_LOGGING_ONLY
